<main class="flex flex-col gap-4 p-4">
  <h2 class="text-2xl font-bold">Todo List</h2>

  <div class="flex flex-col gap-2 p-4 w-[50%]">
    <label for="title">Nouvelle tâche</label>
    <div>
      <input
        type="text"
        class="border-2 border-gray-900 rounded-lg p-2"
        id="title"
        #newTodo
        (keyup.enter)="addTodo(newTodo.value); newTodo.value = ''"
      />
    </div>
  </div>

  <div class="flex flex-col gap-4">
    <h3 class="text-xl font-bold">Tâches à faire</h3>
    <ul class="flex flex-col gap-4 p-4">
      @for (todo of incompleteTodos(); track todo.id) {
        <li class="flex gap-2 items-center">
          @if (editingId === todo.id) {
            <input
              #editInput
              [value]="todo.title"
              class="px-2 py-1 border rounded"
              (keyup.enter)="updateTodo(todo.id, editInput.value)"
              (blur)="updateTodo(todo.id, editInput.value)"
            />
          } @else {
            <span class="cursor-pointer" (dblclick)="startEdit(todo.id)">
              {{ todo.title }}
            </span>
          }
          <span class="ml-2">
            <button
              type="button"
              class="cursor-pointer rounded-lg text-white bg-gray-950 box-border border border-transparent hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none"
              (click)="toggleTodo(todo.id)"
            >
              {{ todo.isDone ? 'Marquer comme non terminée' : 'Marquer comme terminée' }}
            </button>
          </span>
          <span class="m-2">
            <button
              type="button"
              class="cursor-pointer rounded-lg text-white bg-red-700 box-border border border-transparent hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none"
              (click)="removeTodo(todo.id)"
            >
              Supprimer
            </button>
          </span>
        </li>
      }
    </ul>
  </div>
  <div class="flex flex-col gap-4">
    <h3 class="text-xl font-bold">Tâches terminées</h3>
    <ul class="flex flex-col gap-4 p-4">
      @for (todo of completedTodos(); track todo.id) {
        <li class="flex gap-2 items-center">
          @if (editingId === todo.id) {
            <input
              #editInput
              [value]="todo.title"
              class="px-2 py-1 border rounded"
              (keyup.enter)="updateTodo(todo.id, editInput.value)"
              (blur)="updateTodo(todo.id, editInput.value)"
            />
          } @else {
            <span class="cursor-pointer" (dblclick)="startEdit(todo.id)">
              {{ todo.title }}
            </span>
          }
          <span class="ml-2">
            <button
              type="button"
              class="cursor-pointer rounded-lg text-white bg-gray-950 box-border border border-transparent hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none"
              (click)="toggleTodo(todo.id)"
            >
              {{ todo.isDone ? 'Marquer comme non terminée' : 'Marquer comme complétée' }}
            </button>
          </span>
          <span class="m-2">
            <button
              type="button"
              class="cursor-pointer rounded-lg text-white bg-red-700 box-border border border-transparent hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none"
              (click)="removeTodo(todo.id)"
            >
              Supprimer
            </button>
          </span>
        </li>
      }
    </ul>
  </div>
</main>
