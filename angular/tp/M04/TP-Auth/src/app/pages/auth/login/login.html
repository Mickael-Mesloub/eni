<div class="flex flex-col gap-6 p-6 max-w-sm mx-auto">
  <h2 class="text-2xl font-bold">Login</h2>
  <div>
    <label for="login" class="block mb-2.5 text-sm font-medium text-slate-900">Your login</label>
    <input
      type="text"
      id="login"
      class="bg-transparent border border-slate-700 text-slate-900 text-sm rounded-lg focus:ring-blue-700 focus:border-blue-700 block w-full px-3 py-2.5 shadow-xs placeholder:text-body"
      placeholder="Username or email"
      required
    />
  </div>
  <div>
    <label for="password" class="block mb-2.5 text-sm font-medium text-slate-900"
      >Your password</label
    >
    <input
      type="password"
      id="password"
      class="bg-transparent border border-slate-700 text-slate-900 text-sm rounded-lg focus:ring-blue-700 focus:border-blue-700 block w-full px-3 py-2.5 shadow-xs placeholder:text-body"
      placeholder="••••••••"
      required
    />
  </div>
  <button
    type="submit"
    class="text-white bg-blue-700 box-border border border-transparent hover:bg-blue-900 focus:ring-4 focus:ring-blue-700 shadow-xs font-medium leading-5 rounded-lg text-sm px-4 py-2.5 focus:outline-none"
  >
    Submit
  </button>
</div>
