@if (invalidCredentialsMessage) {
  <p class="py-4 font-bold text-red-600 text-center">{{ invalidCredentialsMessage }}</p>
}

<div class="flex flex-col gap-6 p-6 max-w-sm mx-auto">
  <h2 class="text-2xl font-bold">Se connecter</h2>
  <div>
    <label for="login" class="block mb-2.5 text-sm font-medium text-slate-900"
      >Nom d'utilisateur</label
    >
    <input
      [ngModel]="login"
      type="text"
      id="login"
      class="bg-transparent border border-slate-700 text-slate-900 text-sm rounded-lg focus:ring-blue-700 focus:border-blue-700 block w-full px-3 py-2.5 shadow-xs placeholder:text-body"
      placeholder="Nom d'utilisateur"
      required
    />
  </div>
  <div>
    <label for="password" class="block mb-2.5 text-sm font-medium text-slate-900"
      >Mot de passe</label
    >
    <input
      [ngModel]="password"
      type="password"
      id="password"
      class="bg-transparent border border-slate-700 text-slate-900 text-sm rounded-lg focus:ring-blue-700 focus:border-blue-700 block w-full px-3 py-2.5 shadow-xs placeholder:text-body"
      placeholder="••••••••"
      required
    />
  </div>
  <button
    (click)="submit()"
    class="cursor-pointer text-white bg-blue-700 box-border border border-transparent hover:bg-blue-900 focus:ring-4 shadow-xs leading-5 rounded-lg text-sm px-4 py-2.5 disabled:bg-slate-300 disabled:text-slate-500 disabled:cursor-not-allowed"
  >
    Se connecter
  </button>
  <div class="flex gap-1">
    <p>Pas encore de compte ?</p>
    <span class="text-blue-500 cursor-pointer" (click)="navigateToRegister()">S'inscrire</span>
  </div>
</div>
